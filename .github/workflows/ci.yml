# CI : backend (pytest) + frontend (build Next.js).
# Hermétique : OPTCG_APP_SUPPORT pointe un dossier vide — aucun test ne doit dépendre
# des données du jeu installé (le .pck, les decks ou les logs de la machine).
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      OPTCG_APP_SUPPORT: /tmp/optcg-ci-sandbox
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: mkdir -p "$OPTCG_APP_SUPPORT"
      - run: pip install -e ".[dev]"
      - run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
