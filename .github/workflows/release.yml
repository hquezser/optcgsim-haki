name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Verify tag and package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python - <<'PY'
          import os
          import re

          from optcgsim_haki import __version__

          tag = os.environ["RELEASE_TAG"]
          if not re.fullmatch(r"v\d+\.\d+\.\d+", tag):
              raise SystemExit(f"Release tag must match vX.Y.Z, got {tag!r}")
          if tag[1:] != __version__:
              raise SystemExit(
                  f"Release tag {tag!r} does not match package version {__version__!r}"
              )
          PY

  build:
    name: Build and attest distributions
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          npm ci --prefix frontend

      - name: Build embedded frontend and distributions
        run: |
          ./scripts/build_frontend.sh
          python -m build
          python -m twine check dist/*

      - name: Smoke-test wheel
        run: |
          python -m venv "$RUNNER_TEMP/release-smoke"
          "$RUNNER_TEMP/release-smoke/bin/python" -m pip install dist/*.whl
          cd "$RUNNER_TEMP"
          "$RUNNER_TEMP/release-smoke/bin/optcgsim-haki" --help
          "$RUNNER_TEMP/release-smoke/bin/python" -c \
            "from optcgsim_haki.resources import has_frontend; assert has_frontend()"

      - name: Attest distribution provenance
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-distributions
          path: dist/*
          if-no-files-found: error

  github-release:
    name: Attach distributions to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: python-distributions
          path: dist

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: gh release upload "$RELEASE_TAG" dist/* --clobber

  pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/optcgsim-haki/
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: python-distributions
          path: dist

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: dist/
